name: iOS TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'capacitor.config.ts'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      skip_upload:
        description: 'Build only — skip TestFlight upload'
        type: boolean
        default: false

concurrency:
  group: ios-testflight
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios/App

      - name: Write App Store Connect API key
        env:
          ASC_AUTH_KEY_P8: ${{ secrets.ASC_AUTH_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_AUTH_KEY_P8" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Verify API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          KEY_FILE=~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Key file exists: $(test -f "$KEY_FILE" && echo yes || echo no)"
          echo "Key file size: $(wc -c < "$KEY_FILE") bytes"
          head -1 "$KEY_FILE"
          tail -1 "$KEY_FILE"

      - name: Build & upload to TestFlight
        working-directory: ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APNS_TEAM_ID }}
          SKIP_UPLOAD: ${{ inputs.skip_upload }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 30
        run: bundle exec fastlane beta
